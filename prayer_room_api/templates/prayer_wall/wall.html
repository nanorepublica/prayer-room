{% extends "public_base.html" %}

{% block title %}Prayer Wall — Prayer Room{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 py-10">

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <h1 class="text-2xl font-bold text-stone-900 dark:text-stone-100">Prayer Wall</h1>
        <a href="{% url 'submit-prayer' %}"
           class="inline-block px-4 py-2 bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 rounded-lg text-sm font-medium hover:bg-stone-700 dark:hover:bg-stone-300 transition-colors">
            Submit a Prayer
        </a>
    </div>

    <div class="flex flex-wrap gap-2 mb-8" role="tablist" aria-label="Filter by location">
        <a href="{% url 'prayer-wall' %}"
           hx-get="{% url 'prayer-wall' %}"
           hx-target="#prayer-grid"
           hx-push-url="true"
           class="px-3 py-1.5 text-sm rounded-full border transition-colors {% if not current_location %}bg-stone-900 text-white dark:bg-stone-100 dark:text-stone-900 border-stone-900 dark:border-stone-100{% else %}border-stone-300 dark:border-stone-600 text-stone-600 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800{% endif %}"
           role="tab"
           aria-selected="{% if not current_location %}true{% else %}false{% endif %}">
            All
        </a>
        {% for location in locations %}
        <a href="{% url 'prayer-wall' %}?location={{ location.slug }}"
           hx-get="{% url 'prayer-wall' %}?location={{ location.slug }}"
           hx-target="#prayer-grid"
           hx-push-url="true"
           class="px-3 py-1.5 text-sm rounded-full border transition-colors {% if current_location == location.slug %}bg-stone-900 text-white dark:bg-stone-100 dark:text-stone-900 border-stone-900 dark:border-stone-100{% else %}border-stone-300 dark:border-stone-600 text-stone-600 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800{% endif %}"
           role="tab"
           aria-selected="{% if current_location == location.slug %}true{% else %}false{% endif %}">
            {{ location.name }}
        </a>
        {% endfor %}
    </div>

    <div id="prayer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% include "prayer_wall/_prayer_list.html" %}
    </div>

</div>
{% endblock %}
