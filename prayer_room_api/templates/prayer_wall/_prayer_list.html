{% for prayer in prayers %}
    {% include "prayer_wall/_prayer_card.html" with prayer=prayer %}
{% empty %}
    <div class="col-span-full text-center py-12 text-stone-400 dark:text-stone-500">
        <p class="text-lg mb-2">{{ site.empty_wall_heading|default:"No prayers yet." }}</p>
        <a href="{% url 'submit-prayer' %}" class="text-stone-600 dark:text-stone-400 underline hover:no-underline">Be the first to submit one.</a>
    </div>
{% endfor %}

{% if page_obj.has_next %}
<div id="load-more" class="col-span-full text-center pt-4">
    <button hx-get="{% url 'prayer-wall' %}?page={{ page_obj.next_page_number }}{% if current_location %}&location={{ current_location }}{% endif %}"
            hx-target="#load-more"
            hx-swap="outerHTML"
            class="px-5 py-2 text-sm border border-stone-300 dark:border-stone-600 text-stone-600 dark:text-stone-400 rounded-lg hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors">
        Load more
    </button>
</div>
{% endif %}
