<div id="prayer-{{ prayer.pk }}" class="bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-lg p-5 flex flex-col gap-3">
    <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2">
            <span class="text-sm font-medium text-stone-900 dark:text-stone-100">{{ prayer.name }}</span>
            {% if prayer.type == "praise" %}
            <span class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 dark:bg-amber-900 dark:text-amber-300">Praise</span>
            {% else %}
            <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300">Prayer</span>
            {% endif %}
        </div>
        <span class="text-xs text-stone-400 dark:text-stone-500 shrink-0">{{ prayer.created_at|timesince }} ago</span>
    </div>

    <p class="text-sm text-stone-700 dark:text-stone-300 leading-relaxed">{{ prayer.content }}</p>

    {% if prayer.response_comment %}
    <div class="bg-stone-50 dark:bg-stone-700/50 rounded-md p-3 border-l-2 border-stone-300 dark:border-stone-500">
        <p class="text-xs text-stone-500 dark:text-stone-400 mb-1 font-medium">Response</p>
        <p class="text-sm text-stone-600 dark:text-stone-300">{{ prayer.response_comment }}</p>
    </div>
    {% endif %}

    <div class="flex items-center justify-between pt-1">
        <div class="flex items-center gap-1">
            <button hx-post="{% url 'pray-prayer' prayer.pk %}"
                    hx-target="#prayer-{{ prayer.pk }}"
                    hx-swap="outerHTML"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-md border border-stone-200 dark:border-stone-600 text-stone-600 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-700 transition-colors"
                    aria-label="I prayed for this">
                &#128591;
                <span>{{ prayer.prayer_count }}</span>
            </button>
        </div>
        <div class="flex items-center gap-2">
            {% if prayer.location %}
            <span class="text-xs text-stone-400 dark:text-stone-500">{{ prayer.location.name }}</span>
            {% endif %}
            <button hx-post="{% url 'flag-prayer' prayer.pk %}"
                    hx-target="#prayer-{{ prayer.pk }}"
                    hx-swap="innerHTML"
                    hx-confirm="Are you sure you want to report this prayer?"
                    class="text-stone-300 hover:text-stone-500 dark:text-stone-600 dark:hover:text-stone-400 text-xs"
                    aria-label="Report this prayer">
                &#9873;
            </button>
        </div>
    </div>
</div>
